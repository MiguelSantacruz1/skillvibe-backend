# 1. Conexion a la Base de Datos
# Buscamos todas las posibles variantes de nombres de Railway
server.port=${PORT:8080}
spring.datasource.url=jdbc:postgresql://${PGHOST:${POSTGRES_HOST}}:${PGPORT:${POSTGRES_PORT:5432}}/${PGDATABASE:${POSTGRES_DB:railway}}
spring.datasource.username=${PGUSER:${POSTGRES_USER:postgres}}
spring.datasource.password=${PGPASSWORD:${POSTGRES_PASSWORD}}




# 2. Configuracion de Hibernate y JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Hibernate detecta el dialecto automáticamente para Postgres

# 3. Seguridad y JWT
# En la nube debes configurar la variable JWT_SECRET en el dashboard de Railway
app.jwt.secret=${JWT_SECRET:SkillVibe_fesa81852027_Secure_JWT_Key_UCC_Pasto_2026_!}
app.jwt.expiration=86400000

# 4. Formato de Logs
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.web=INFO

# 5. Configuración de CORS
# Se traen desde las variables de entorno o usa los de Vercel/Local por defecto
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,https://skillvibe-frontend.vercel.app,https://skillvibe-frontend-qhz980mj7-miguelsantacruz1s-projects.vercel.app}